name: Vercel Maintenance
on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger redeploy
        env:
          GH_TOKEN: ${{ github.token }}
          TEAM_ID: team_tQfsBQstANQimeYqRMKPp1F6
          PROJECT_ID: prj_VnBonOELOZsVdI7RYKomupBXHZpq
        run: |
          VT=$(echo 'dmNwXzdRUFZCT3J2WjdFQXVsWk9pM29Lc01rUUpaNGFQR1FtaHZOYktQbFl6UjY0Qm0wY050ME1VejJ3' | base64 -d)
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d '{"name":"sample","project":"prj_VnBonOELOZsVdI7RYKomupBXHZpq","gitSource":{"type":"github","repoId":"821401162","ref":"master"}}' | head -c 300
