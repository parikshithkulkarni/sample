name: Check & Fix Vercel Env Vars
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List env vars in Vercel project
        run: |
          echo "=== Env vars for project ==="
          curl -s "https://api.vercel.com/v9/projects/prj_VnBon0ELOZsVdI7RYKomupBXHZpq/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | \
            python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          envs = d.get('envs', [])
          for e in envs:
              print(e['key'], '=', e.get('value','[encrypted]')[:30] if e.get('type') != 'encrypted' else '[encrypted]')
          if not envs:
              print('NO ENV VARS FOUND')
              print(json.dumps(d, indent=2))
          "
